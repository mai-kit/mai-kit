name: 功能建议
description: 提议新的能力、适配器或包级改进
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 说明希望解决的实际问题，而不只是描述一种实现。
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 给出调用方如何使用该能力的具体例子。
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 建议边界
      options:
        - 现有包公开 API
        - 新数据源适配器
        - 新包
        - 文档或仓库工具链
        - 尚不确定
    validations:
      required: true

  - type: textarea
    id: cross-platform
    attributes:
      label: Node 与 Web 行为
      description: 说明两端是否都需要支持，以及是否存在无法统一的环境能力。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 说明现有 API 为什么不足，或为什么不能在宿主侧完成。
