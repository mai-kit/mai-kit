name: Bug 报告
description: 报告可复现的错误或行为异常
title: "bug: "
labels:
  - bug
body:
  - type: dropdown
    id: package
    attributes:
      label: 相关包
      options:
        - "@mai-kit/shared"
        - "@mai-kit/utils"
        - "@mai-kit/judgement-solver"
        - "@mai-kit/database"
        - "@mai-kit/prober"
        - "@mai-kit/analysis"
        - "@mai-kit/assets"
        - "@mai-kit/draw"
        - 文档或仓库工具链
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本
      description: 包版本、提交 SHA 或分支名称
      placeholder: "例如 @mai-kit/draw@0.1.2"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: 运行环境
      multiple: true
      options:
        - Node.js
        - 浏览器
        - 构建或 CI
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 最小复现
      description: 提供尽可能小的代码、输入数据和复现步骤；请移除令牌与个人数据。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误信息
      description: 可粘贴错误堆栈或日志；请移除令牌与个人数据。
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认问题可在当前版本复现。
          required: true
        - label: 我没有在内容中包含令牌、好友码或其他敏感信息。
          required: true
