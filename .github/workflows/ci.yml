name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check / typecheck / test / docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # check 会先 build，供 type-aware lint 解析跨包 dist/*.d.ts
      - name: Build & check
        run: pnpm check

      - name: Typecheck
        # 依赖上一步 dist/*.d.ts，不再重复 build
        run: pnpm --filter "./packages/*" -r run typecheck && pnpm exec tsc --noEmit -p tsconfig.test.json && pnpm exec tsc --noEmit -p tests/web/tsconfig.json

      - name: Unit tests
        run: pnpm --filter "./packages/*" -r --if-present run test:unit

      - name: Build docs
        # check 已生成包产物；这里只生成 TypeDoc/VitePress 站点并跑 generated-api 测试
        run: pnpm docs:build:built

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2

      - name: Browser smoke
        # check 已生成包产物；避免 test:web 再 build 一次
        run: pnpm test:web:built

      - name: Upload validated docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-site
          path: docs/.vitepress/dist
          if-no-files-found: error
          retention-days: 1
