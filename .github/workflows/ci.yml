name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version 取自 package.json 的 packageManager

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # 与 AGENTS.md 交付门禁一致：format + lint → build → typecheck → unit test
      - name: Format & lint
        run: pnpm check

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        # build-first：依赖上一步 dist/*.d.ts，不再重复 build
        run: pnpm --filter "./packages/*" -r run typecheck

      - name: Unit tests
        run: pnpm --filter "./packages/*" -r --if-present run test:unit
