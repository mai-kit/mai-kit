name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # check 会先 build，供 type-aware lint 解析跨包 dist/*.d.ts
      - name: Build & check
        run: pnpm check

      - name: Typecheck
        # 依赖上一步 dist/*.d.ts，不再重复 build
        run: pnpm --filter "./packages/*" -r run typecheck

      - name: Unit tests
        run: pnpm --filter "./packages/*" -r --if-present run test:unit
