name: Sync DXRating chart tags

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-dxrating-tags
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mai-kit/database sync:dxrating-tags
      - run: pnpm --filter @mai-kit/database test
      - run: pnpm check

      - name: Create update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain -- packages/database/data/dxrating-tags.json)" ]]; then
            echo "DXRating chart tags are already up to date."
            exit 0
          fi

          branch="automation/sync-dxrating-tags"
          git switch -C "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/database/data/dxrating-tags.json
          git commit -m "chore(database): 同步 DXRating 谱面标签"

          remote_sha="$(git ls-remote --heads origin "refs/heads/$branch" | cut -f1)"
          if [[ -n "$remote_sha" ]]; then
            git push \
              --force-with-lease="refs/heads/$branch:$remote_sha" \
              origin \
              "HEAD:refs/heads/$branch"
          else
            git push --set-upstream origin "$branch"
          fi

          pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            echo "Updated existing pull request #$pr_number."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(database): 同步 DXRating 谱面标签" \
            --body $'## 改动说明\n\n同步 DXRating 上游谱面标签快照。\n\n## 主要改动\n\n- 更新 `packages/database/data/dxrating-tags.json`。\n- 由常规 CI 验证构建、测试、文档与 Web smoke。\n\n## 验证\n\n- `pnpm --filter @mai-kit/database test`\n- `pnpm check`\n\n## 注意事项\n\n该 PR 由仓库 `GITHUB_TOKEN` 创建或更新；维护者需在 Actions 中批准其检查运行。'
