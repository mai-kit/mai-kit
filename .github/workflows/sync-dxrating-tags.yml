name: Sync DXRating chart tags

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version

      - name: Enable pnpm
        run: corepack enable pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mai-kit/database sync:dxrating-tags
      - run: pnpm --filter @mai-kit/database test
      - run: pnpm check

      - name: Commit updated snapshot
        run: |
          if [[ -z "$(git status --porcelain -- packages/database/data/dxrating-tags.json)" ]]; then
            echo "DXRating chart tags are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/database/data/dxrating-tags.json
          git commit -m "chore(database): 同步 DXRating 谱面标签"
          git push
