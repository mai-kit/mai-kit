# npm 发布：Changesets + OIDC Trusted Publishing（无 NPM_TOKEN）
#
# 流程：
# 1. CI 对 main push 的精确提交完成全部门禁
# 2. 本 workflow 仅在该 CI 成功后运行：有 changeset → 开/更新 Version PR
# 3. 合并 Version PR 后再次经过 CI → changeset publish（OIDC）
#
# npm 上每个 @mai-kit/* 包需配置 Trusted Publisher：
#   Organization/user + Repository + Workflow filename: release.yml
#   （只填文件名，不要 .github/workflows/ 前缀）
#
# 要求：GitHub-hosted runner、package.json 的 repository 与仓库一致

name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC → npm Trusted Publishing

jobs:
  release:
    name: version or publish
    # workflow_run 具有写权限和 secrets；只接受本仓库 main 的 push CI，绝不处理 PR/fork 产物。
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # 发布/Version PR 必须基于 CI 实际验证过的提交，不能隐式 checkout 更新后的 main。
          ref: ${{ github.event.workflow_run.head_sha }}
          # changesets 需要完整历史以生成 changelog
          fetch-depth: 0

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          # 发版不用依赖缓存，避免把发布结果绑定到可变缓存状态。
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable pnpm

      # 精确版本同时满足 Trusted Publishing 与 npm trust 的版本要求。
      - name: Use trusted-publishing npm
        run: npm install -g npm@11.16.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          # workflow_run checkout 为精确 SHA；显式指定 Version PR 的目标分支。
          branch: main
          version: pnpm run ci:version
          publish: pnpm run ci:publish
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 故意不设置 NPM_TOKEN / NODE_AUTH_TOKEN：走 OIDC
